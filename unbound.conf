# unbound-container — unbound.conf
# General defaults — works out of the box for most setups
# Override specific settings by mounting your own config file:
#   -v /path/to/unbound.conf:/etc/unbound/unbound.conf:ro
#
# Environment variables override port, threads, and cache sizes.
# Everything else is configured here.
#
# github.com/mmBesar/unbound-container

server:

    # ── Modules ───────────────────────────────────────────────────────────────
    # validator: DNSSEC validation
    # iterator:  recursive resolution
    # Note: subnetcache is intentionally excluded — it conflicts with
    # serve-expired and prefetch which are more useful for most setups
    module-config: "validator iterator"

    # ── Network ───────────────────────────────────────────────────────────────
    # Port is overridden by entrypoint.sh from UNBOUND_PORT env var
    interface: 0.0.0.0@5053
    interface: ::0@5053

    # Accept queries from private networks and localhost only
    # Safe default — Unbound should never be exposed to the internet
    access-control: 0.0.0.0/0 refuse
    access-control: ::0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
    access-control: ::1 allow
    access-control: fc00::/7 allow

    # ── Performance ───────────────────────────────────────────────────────────
    # Overridden by entrypoint.sh from env vars
    num-threads: 2
    msg-cache-size: 32m
    rrset-cache-size: 64m

    # Slabs — power of 2, set to num-threads * 2
    msg-cache-slabs: 4
    rrset-cache-slabs: 4
    infra-cache-slabs: 4
    key-cache-slabs: 4

    # Cache TTL
    cache-min-ttl: 60
    cache-max-ttl: 86400

    # Prefetch records before expiry — keeps cache warm, reduces latency
    prefetch: yes
    prefetch-key: yes

    # Serve stale records while refreshing — reduces latency on cache miss
    serve-expired: yes
    serve-expired-ttl: 3600

    # Aggressive NSEC — faster negative answers with DNSSEC
    aggressive-nsec: yes

    # ── Privacy ───────────────────────────────────────────────────────────────
    # Send minimum required query labels to each nameserver
    # Reduces what root/TLD servers learn about your queries
    qname-minimisation: yes

    # Don't reveal version or identity
    hide-identity: yes
    hide-version: yes

    # ── Security / DNSSEC ─────────────────────────────────────────────────────
    # trust-anchor-file: uses root.key as-is — no startup fetch attempt
    # unbound-anchor in entrypoint.sh keeps root.key current
    # Using auto-trust-anchor-file causes startup failures when DNS
    # is not yet available (common in container environments)
    trust-anchor-file: "/var/lib/unbound/root.key"

    # Hardening
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-referral-path: yes
    harden-algo-downgrade: yes
    harden-short-bufsize: yes
    harden-large-queries: yes

    # 0x20 random case — makes spoofing harder
    use-caps-for-id: yes

    # DNS rebinding protection — block private IPs in public DNS responses
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fd00::/8
    private-address: fe80::/10

    # ── Local domains ─────────────────────────────────────────────────────────
    # Standard RFC local domains — handled by Pi-hole or local DNS
    # Do not forward these to root servers
    private-domain: "local"
    private-domain: "lan"
    private-domain: "home"
    private-domain: "internal"
    private-domain: "intranet"
    private-domain: "corp"
    domain-insecure: "local"
    domain-insecure: "lan"
    domain-insecure: "home"
    domain-insecure: "internal"
    domain-insecure: "intranet"
    domain-insecure: "corp"

    # ── Root hints ────────────────────────────────────────────────────────────
    root-hints: "/var/lib/unbound/root.hints"

    # ── Privileges ───────────────────────────────────────────────────────────
    username: "unbound"

    # ── Logging ───────────────────────────────────────────────────────────────
    # Set verbosity: 0=error 1=info 2=detail 3=query 4=algo
    verbosity: 1
    log-queries: no
    log-replies: no
    log-tag-queryreply: no
    use-syslog: no

    # ── Protocol ──────────────────────────────────────────────────────────────
    do-ip4: yes
    do-ip6: yes
    do-udp: yes
    do-tcp: yes

    # EDNS buffer — RFC 8200 recommended safe value
    edns-buffer-size: 1232

    # Connection limits
    outgoing-range: 8192
    num-queries-per-thread: 4096

    # Smaller responses — less bandwidth
    minimal-responses: yes
