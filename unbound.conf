# unbound-container — unbound.conf
# Optimized for:
#   - Pi-hole upstream resolver (port 5053)
#   - Full recursive DNS (no forwarding to third parties)
#   - DNSSEC validation
#   - Query name minimization (privacy)
#   - Low memory footprint (suitable for 4GB boards)
#
# github.com/mmBesar/unbound-container

server:

    # ── Network ──────────────────────────────────────────────────────────────
    # Listen on all interfaces on port 5053
    # Pi-hole connects to this container by name on port 5053
    interface: 0.0.0.0@5053
    interface: ::0@5053

    # Allow queries from Docker networks and localhost only
    # Adjust if your Docker bridge subnet is different
    access-control: 0.0.0.0/0 refuse
    access-control: ::0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow     # Docker bridge networks
    access-control: 192.168.0.0/16 allow    # Local networks
    access-control: 10.0.0.0/8 allow        # Local networks
    access-control: ::1 allow

    # ── Performance ───────────────────────────────────────────────────────────
    # Threads — use 2 for low-power boards, 4 for more powerful ones
    # 2 threads leaves plenty of headroom on an 8-core board
    num-threads: 2

    # Cache sizes — tuned for low RAM usage
    # msg-cache stores DNS messages, rrset-cache stores individual records
    # rrset should be 2x msg for optimal DNSSEC performance
    msg-cache-size: 32m
    rrset-cache-size: 64m

    # Slabs — power of 2, close to num-threads * 4
    msg-cache-slabs: 8
    rrset-cache-slabs: 8
    infra-cache-slabs: 8
    key-cache-slabs: 8

    # Cache TTL limits
    cache-min-ttl: 60        # Don't cache records less than 60 seconds
    cache-max-ttl: 86400     # Cache records for at most 24 hours

    # Prefetch popular records before they expire (keeps cache warm)
    prefetch: yes
    prefetch-key: yes

    # Aggressive NSEC — faster negative caching with DNSSEC
    aggressive-nsec: yes

    # ── Privacy ───────────────────────────────────────────────────────────────
    # Query name minimization — only send the minimum required labels
    # to each nameserver, reducing information leakage
    qname-minimisation: yes

    # Hide version and identity from queries
    hide-identity: yes
    hide-version: yes

    # ── Security ──────────────────────────────────────────────────────────────
    # DNSSEC validation — validates all signed responses
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    # Harden against various attacks
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-referral-path: yes
    harden-algo-downgrade: yes
    harden-short-bufsize: yes
    harden-large-queries: yes

    # Use 0x20 encoding for additional forgery resistance
    use-caps-for-id: yes

    # Protect against DNS rebinding attacks
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fd00::/8
    private-address: fe80::/10

    # ── Local domain handling ─────────────────────────────────────────────────
    # Tell Unbound not to validate local/private domain names
    # These will be handled by Pi-hole's local DNS
    private-domain: "local"
    private-domain: "lan"
    private-domain: "home"
    private-domain: "mm"            # your local TLD
    domain-insecure: "local"
    domain-insecure: "lan"
    domain-insecure: "home"
    domain-insecure: "mm"           # your local TLD

    # ── Root hints ────────────────────────────────────────────────────────────
    root-hints: "/var/lib/unbound/root.hints"

    # ── Logging ───────────────────────────────────────────────────────────────
    # Minimal logging for privacy and performance
    # Set verbosity to 2 temporarily if debugging
    verbosity: 1
    log-queries: no
    log-replies: no
    log-tag-queryreply: no

    # ── Other ─────────────────────────────────────────────────────────────────
    # Drop privileges after binding to port
    username: "unbound"

    # Don't use /etc/hosts
    use-syslog: no

    # Serve expired records while refreshing (reduces latency)
    serve-expired: yes
    serve-expired-ttl: 3600

    # EDNS buffer size — safe default
    edns-buffer-size: 1232

    # IP TTL for outgoing packets
    outgoing-range: 8192
    num-queries-per-thread: 4096

    # Enable IPv4 and IPv6
    do-ip4: yes
    do-ip6: yes
    do-udp: yes
    do-tcp: yes

    # Minimal responses — reduce packet size
    minimal-responses: yes
